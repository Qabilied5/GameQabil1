<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage War: Hero vs Bot (Skill Expansion)</title>
    <style>
        :root { --p1: #00d2ff; --bot: #ff4757; --warn: #ffa502; --freeze: #74b9ff; --burn: #e67e22; --vamp: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: #05070a; color: white; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; justify-content: center; transition: background 0.5s; }
        
        body.active-p1 { background: radial-gradient(circle at 30%, #003a4d 0%, #05070a 60%); }
        body.active-bot { background: radial-gradient(circle at 70%, #4d0000 0%, #05070a 60%); }

        #event-banner { position: absolute; top: 20px; background: rgba(255, 255, 255, 0.1); padding: 10px 40px; border-radius: 50px; font-weight: bold; text-transform: uppercase; opacity: 0; z-index: 10; border: 2px solid transparent; }
        .event-active { opacity: 1 !important; border-color: gold !important; box-shadow: 0 0 20px gold; }

        #global-timer { font-size: 3.5rem; font-weight: 900; color: var(--warn); margin: 10px 0; z-index: 5; }
        
        .game-wrapper { display: flex; gap: 50px; position: relative; }

        .card { background: #11141d; border: 3px solid #222; border-radius: 20px; padding: 25px; width: 320px; transition: 0.5s; position: relative; z-index: 2; }
        
        /* Debuff Visuals */
        .frozen { border-color: var(--freeze) !important; box-shadow: 0 0 30px var(--freeze) !important; filter: saturate(0.5) brightness(1.2); }
        .burning { border-color: var(--burn) !important; box-shadow: 0 0 25px var(--burn) !important; }
        .debuff-label { font-weight: bold; display: block; text-align: center; margin-bottom: 5px; font-size: 0.8rem; }

        @keyframes pulse-p1 { 0%, 100% { box-shadow: 0 0 20px var(--p1); } 50% { box-shadow: 0 0 60px var(--p1); } }
        @keyframes pulse-bot { 0%, 100% { box-shadow: 0 0 20px var(--bot); } 50% { box-shadow: 0 0 60px var(--bot); } }

        .active-p1 #p1-card:not(.frozen) { border-color: var(--p1); animation: pulse-p1 2s infinite; transform: scale(1.05); }
        .active-bot #bot-card:not(.frozen) { border-color: var(--bot); animation: pulse-bot 2s infinite; transform: scale(1.05); }
        .active-p1 #bot-card, .active-bot #p1-card { opacity: 0.3; filter: grayscale(0.7); transform: scale(0.9); }

        .bar-bg { height: 18px; background: #1e222d; border-radius: 9px; margin: 10px 0; overflow: hidden; border: 1px solid #333; position: relative; }
        .hp-fill { background: linear-gradient(90deg, #ff416c, #ff4b2b); width: 100%; height: 100%; transition: 0.3s; }
        .mana-fill { background: linear-gradient(90deg, #12c2e9, #c471ed); width: 20%; height: 100%; transition: 0.3s; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 0.7rem; font-weight: bold; top: 1px; color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .skill-box { position: relative; border-radius: 8px; overflow: hidden; background: #2d3436; height: 45px; }
        button { width: 100%; height: 100%; border: none; background: transparent; color: white; font-weight: bold; cursor: pointer; z-index: 5; position: relative; font-size: 0.65rem; }
        button:disabled { cursor: not-allowed; opacity: 0.2; }
        .cd-text { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; color: white; z-index: 6; pointer-events: none; }
        .cd-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 1; transition: height linear; }

        #log { background: #000; width: 690px; height: 100px; margin-top: 25px; padding: 15px; border-radius: 10px; border: 1px solid #333; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: #00ff00; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-8px, 8px); } 50% { transform: translate(8px, -8px); } }

        .shield-active {
            border: 4px solid #2980b9 !important;
            box-shadow: 0 0 20px #3498db;
            transform: scale(1.02);
            transition: all 0.3s ease;
        }

        /* Opsional: Tambahkan indikator teks shield di dalam kartu */
        .shield-active::after {
            content: "🛡️ SHIELD ACTIVE";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #2980b9;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .shield-hit {
            animation: shield-pulse 0.3s ease-out;
            box-shadow: 0 0 40px #3498db !important;
        }

        @keyframes shield-pulse {
            0% { transform: scale(1.02); }
            50% { transform: scale(1.1); border-color: #fff; }
            100% { transform: scale(1.02); }
        }

        /* Fire Effect */
        @keyframes fire-glow {
            0% { box-shadow: 0 -10px 20px #e67e22, 0 0 15px #f1c40f; }
            50% { box-shadow: 0 -20px 40px #d35400, 0 0 25px #e67e22; }
            100% { box-shadow: 0 -10px 20px #e67e22, 0 0 15px #f1c40f; }
        }

        @keyframes fire-flicker {
            0% { transform: scale(1) translateY(0); }
            25% { transform: scale(1.01) translateY(-1px) rotate(0.5deg); }
            50% { transform: scale(1) translateY(0) rotate(-0.5deg); }
            75% { transform: scale(1.01) translateY(-1px); }
            100% { transform: scale(1) translateY(0); }
        }

        .burning {
            border-color: #e67e22 !important;
            background: linear-gradient(to top, #11141d, #4d2600) !important; /* Gradien merah api */
            animation: fire-glow 1.5s infinite alternate, fire-flicker 0.2s infinite !important;
            position: relative;
        }

        /* Partikel Api (Opsional: Muncul di atas kartu) */
        .burning::before {
            content: "🔥";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            filter: drop-shadow(0 0 10px gold);
            animation: fire-flicker 0.3s infinite;
            z-index: 10;
        }

        @keyframes heal-glow {
            0% { box-shadow: 0 0 20px #27ae60; border-color: #2ecc71; }
            50% { box-shadow: 0 0 50px #2ecc71; border-color: #f1f2f6; }
            100% { box-shadow: 0 0 20px #27ae60; border-color: #2ecc71; }
        }

        .healing-active {
            animation: heal-glow 0.8s ease-in-out !important;
            z-index: 10;
        }

        .heal-particle {
            position: absolute;
            color: #00ff88; /* Hijau Neon */
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 1000;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #fff;
            animation: fly-up-fade 1s forwards ease-out;
        }

        @keyframes fly-up-fade {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        @keyframes fly-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* ULTI VISUAL */

        .ulti-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Kilatan Putih Lembut */
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.1) 100%);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            /* Durasi sedikit lebih lama agar transisinya halus */
            animation: flash-anim 0.7s ease-out;
        }

        @keyframes flash-anim {
            0% { opacity: 0; }
            10% { opacity: 1; } /* Kilatan mencapai puncak dengan cepat */
            100% { opacity: 0; } /* Menghilang perlahan */
        }

        /* Shockwave Ring */
        .shockwave {
            position: absolute;
            border: 5px solid #ff4757;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: wave-anim 0.6s ease-out forwards;
        }

        @keyframes wave-anim {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 500px; height: 500px; opacity: 0; margin-left: -250px; margin-top: -250px; }
        }

        /* Angka Damage Melayang */
        .dmg-popup {
            position: absolute;
            color: #ff4757;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 0 0 10px black, 0 0 20px red;
            pointer-events: none;
            z-index: 1001;
            animation: dmg-fly 0.8s forwards ease-out;
        }

        @keyframes dmg-fly {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            50% { transform: scale(1.5) translateY(-50px); }
            100% { transform: scale(1) translateY(-120px); opacity: 0; }
        }
        
        /* Strike Effect */

        .strike-effect {
            position: absolute;
            width: 200px;
            height: 40px;
            background: white;
            box-shadow: 0 0 20px white, 0 0 40px var(--p1);
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transform-origin: center;
            border-radius: 50%;
            animation: strike-anim 0.3s ease-out forwards;
        }

        @keyframes strike-anim {
            0% { transform: scaleX(0) rotate(var(--rot)) skewX(-45deg); opacity: 1; }
            50% { transform: scaleX(1.2) rotate(var(--rot)) skewX(-45deg); opacity: 1; }
            100% { transform: scaleX(1) rotate(var(--rot)) skewX(-45deg); opacity: 0; }
        }

        /* Guncangan ringan khusus Strike */
        .shake-lite {
            animation: shake-lite-anim 0.2s ease-in-out;
        }

        @keyframes shake-lite-anim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Efek Guncangan Layar yang lebih kuat */
        .heavy-shake {
            animation: heavy-shake-anim 0.2s 2;
        }

        /* VAMPIRE EFFECT (HEAVY) */

        /* Aura untuk pengguna Vampire */
        .vampire-active {
            animation: vampire-glow 1s ease-in-out !important;
            z-index: 10;
        }

        @keyframes vampire-glow {
            0% { box-shadow: 0 0 20px #8e44ad; border-color: #9b59b6; }
            50% { box-shadow: 0 0 60px #2c3e50, 0 0 30px #8e44ad; border-color: white; }
            100% { box-shadow: 0 0 20px #8e44ad; border-color: #8e44ad; }
        }

        /* Partikel Energi yang berpindah */
        .vamp-orb {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff4757, #8e44ad);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1500;
            box-shadow: 0 0 15px #8e44ad;
            animation: vamp-travel 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards;
        }

        @keyframes vamp-travel {
            0% { transform: translate(0, 0) scale(1.5); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.5); opacity: 0.5; }
        }

        /* Efek Layar Menggelap */
        .vamp-dim {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 0, 30, 0.4);
            pointer-events: none;
            z-index: 1400;
            opacity: 0;
            animation: vamp-dim-anim 1s ease-out;
        }

        @keyframes vamp-dim-anim {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes heavy-shake-anim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-3px, -2px) rotate(-1deg); }
            20% { transform: translate(-5px, 0px) rotate(1deg); }
            30% { transform: translate(5px, 2px) rotate(0deg); }
            40% { transform: translate(3px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-5px, 1px) rotate(0deg); }
            70% { transform: translate(5px, 1px) rotate(-1deg); }
            80% { transform: translate(-3px, -1px) rotate(1deg); }
            90% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Partikel Percikan */
        .strike-spark {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ff4757;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1002;
            box-shadow: 0 0 10px #ff4757;
            animation: spark-fly 0.5s ease-out forwards;
        }

        @keyframes spark-fly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Flash Merah saat terkena Strike */
        .hit-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.2);
            pointer-events: none;
            z-index: 2000;
            opacity: 0;
            animation: hit-flash-anim 0.2s ease-out;
        }

        @keyframes hit-flash-anim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        button:disabled {
            cursor: not-allowed;
            filter: grayscale(1) brightness(0.5);
            opacity: 0.3;
            position: relative;
        }

        /* Tambahkan teks "LOCKED" kecil di atas tombol yang mati (opsional) */
        button:disabled::before {
            content: "HP < 30%";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #ff4757;
            white-space: nowrap;
        }

        .ready-to-use {
            animation: alert-flash 0.5s infinite alternate !important;
            filter: grayscale(0) brightness(1.2) !important;
            opacity: 1 !important;
            border: 2px solid white !important;
            box-shadow: 0 0 15px #ff4757;
        }

        @keyframes alert-flash {
            from { background: #2ecc71; transform: scale(1); }
            to { background: #ffffff; transform: scale(1.1); color: #000; }
        }

        @media screen and (max-width: 768px) {
            body {
                overflow-y: auto; 
                justify-content: flex-start; 
                padding: 20px 0; 
            }

            /* Banner tetap di paling atas */
            #event-banner { 
                font-size: 0.7rem; 
                padding: 5px 15px; 
                top: 5px; 
            }

            #global-timer { 
                font-size: 2.2rem; 
                margin: 40px 0 10px 0; /* Memberi ruang untuk banner */
            }

            .game-wrapper { 
                display: flex;
                flex-direction: column; 
                gap: 15px; 
                align-items: center; 
                width: 100%; 
            }

            /* --- LOGIKA PENUKARAN POSISI --- */
            #bot-card { order: 1; } /* Bot di urutan pertama (Atas) */
            #p1-card { order: 2; }  /* Player di urutan kedua (Bawah) */

            .card { 
                width: 85%; 
                max-width: 310px; 
                padding: 12px; 
                border-width: 2px;
            }

            .card h2 { 
                font-size: 1rem; 
                margin: 5px 0; 
            }

            .grid { 
                grid-template-columns: 1fr 1fr 1fr; 
                gap: 5px; 
                margin-top: 10px; 
            }

            .skill-box { 
                height: 45px; 
            }

            button { 
                font-size: 0.65rem; 
            }

            #log { 
                order: 3; /* Log berada di paling bawah setelah kartu player */
                width: 85%; 
                height: 80px; 
                margin-top: 15px; 
                font-size: 0.75rem;
            }
        }

        /* Mana Event Visual Efek */

        @keyframes mana-glow-pulse {
            0% { box-shadow: 0 0 5px #12c2e9; filter: brightness(1); }
            50% { box-shadow: 0 0 20px #c471ed, 0 0 30px #12c2e9; filter: brightness(1.5); }
            100% { box-shadow: 0 0 5px #12c2e9; filter: brightness(1); }
        }

        /* Efek Getar Halus */
        @keyframes mana-shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(1px); }
            75% { transform: translateX(-1px); }
        }

        /* Class yang akan dipasang saat MANA BOOST aktif */
        .mana-boost-active {
            animation: mana-glow-pulse 1s infinite ease-in-out, mana-shake 0.1s infinite;
            border: 1px solid white !important;
        }

        @keyframes mana-shaking-violent {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, -1px); }
            20% { transform: translate(-1px, 1px); }
            30% { transform: translate(2px, 0px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            60% { transform: translate(-2px, 0px); }
            70% { transform: translate(2px, 1px); }
            80% { transform: translate(1px, -1px); }
            90% { transform: translate(-1px, 0px); }
            100% { transform: translate(0, 0); }
        }

        /* Animasi cahaya yang berpendar (Glow) */
        @keyframes mana-glow-bright {
            0%, 100% { box-shadow: 0 0 10px #12c2e9, inset 0 0 5px white; filter: brightness(1.2); }
            50% { box-shadow: 0 0 25px #c471ed, 0 0 40px #12c2e9, inset 0 0 15px white; filter: brightness(1.8); }
        }

        /* Class Gabungan untuk diaplikasikan saat MANA BOOST */
        .mana-shaking-active {
            animation: 
                mana-shaking-violent 0.1s infinite, 
                mana-glow-bright 0.6s infinite ease-in-out;
            border: 1px solid #fff !important;
            z-index: 10;
        }

        .punch-text {
            position: fixed;
            font-weight: 900;
            font-size: 28px;
            color: #f1c40f;
            text-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 20px #f39c12;
            pointer-events: none;
            z-index: 10000;
            font-style: italic;
            animation: punch-float 0.8s ease-out forwards;
        }

        @keyframes punch-float {
            0% { transform: scale(0.5) translateY(0); opacity: 0; }
            20% { transform: scale(1.2) translateY(-20px); opacity: 1; }
            100% { transform: scale(1) translateY(-100px); opacity: 0; }
        }

        /* Animasi lingkaran impact kuning */
        @keyframes pulse-out {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .heavy-shake {
            animation: heavy-shake-anim 0.1s infinite;
        }

        @keyframes heavy-shake-anim {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(-8px, 2px); }
            75% { transform: translate(8px, -2px); }
            100% { transform: translate(0, 0); }
        }

        /* --- VISUAL SUPER HEAL --- */
        /* 1. Efek Kartu Menyala Hijau Neon */
        .super-healing-active {
            background: rgba(0, 255, 136, 0.5) !important; 
            
            border: 3px solid #00ff88 !important;
            
            /* Glow Neon Luar Hijau */
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.8) !important;
            
            /* Sedikit pembesaran kartu */
            transform: scale(1.03);
            z-index: 10;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        /* 2. Efek Background Berputar (Healing Aura) */
        .super-healing-active::before {
            content: '';
            position: absolute;
            /* Buat kotak aura JAUH lebih besar dari kartu */
            top: -150%; 
            left: -150%;
            width: 400%;
            height: 400%;
            
            /* Gradien Kerucut (seperti kipas berputar) */
            background: conic-gradient(
                from 0deg at 50% 50%,
                rgba(0, 255, 136, 0) 0deg,
                rgba(0, 255, 136, 0.6) 180deg, /* Warna aura */
                rgba(0, 255, 136, 0) 360deg
            );
            
            /* Animasi putar */
            animation: super-heal-rotate 2s linear infinite;
            z-index: -1; /* Di belakang konten kartu (teks, HP bar) */
        }

        @keyframes super-heal-rotate {
            100% { transform: rotate(360deg); }
        }

        /* 3. Partikel Hijau Super */
        .super-heal-particle {
            position: absolute;
            color: #00ff88;
            font-weight: bold;
            font-size: 1.8rem;
            pointer-events: none;
            z-index: 1000;
            text-shadow: 0 0 15px #00ff88, 0 0 30px #fff;
            animation: super-fly 1.2s forwards cubic-bezier(0.12, 0.82, 0.32, 1);
        }

        @keyframes healing-pulse {
            from { filter: brightness(1) saturate(1); transform: scale(1.02); }
            to { filter: brightness(1.3) saturate(1.5); transform: scale(1.04); }
        }

        @keyframes super-fly {
            0% { 
                transform: translate(0, 0) scale(1) rotate(0deg); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            100% { 
                /* Menyebar lebih jauh dan acak */
                transform: translate(var(--dx), var(--dy)) scale(1.8) rotate(var(--rot)); 
                opacity: 0; 
            }
        }

        .super-healing-active .hp-fill {
            /* Gradien: Hijau Zamrud ke Hijau Neon ke Putih */
            background: linear-gradient(90deg, #00b894, #00ff88, #ffffff) !important;
            
            /* Glow Berlapis Hijau & Putih */
            box-shadow: 
                0 0 20px #fff, 
                0 0 40px #00ff88, 
                0 0 60px rgba(0, 255, 136, 0.6) !important;

            /* Tiga Animasi Sekaligus: Breathing, Shaking, dan Flash (Kedap-kedip) */
            animation: 
                hp-breathing-green 0.8s infinite alternate ease-in-out, 
                hp-shake 0.1s infinite,
                hp-flash-white 0.4s infinite alternate !important;
            
            transition: none !important;
            filter: brightness(1.3);
        }

        @keyframes hp-shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(0, 0); }
        }

        @keyframes hp-breathing {
            0% { 
                filter: brightness(1.1) saturate(1.2);
                box-shadow: 0 0 10px #ff4757, 0 0 20px #ffa502;
            }
            100% { 
                filter: brightness(1.8) saturate(2);
                box-shadow: 0 0 30px #fff, 0 0 60px #ffa502, 0 0 90px rgba(255, 255, 255, 0.4);
            }
        }

        @keyframes hp-breathing-green {
            0% { 
                filter: brightness(1.2) saturate(1.5);
                box-shadow: 0 0 15px #00ff88, 0 0 30px rgba(0, 255, 136, 0.4);
            }
            100% { 
                filter: brightness(2) saturate(2);
                box-shadow: 0 0 35px #fff, 0 0 70px #00ff88, 0 0 100px rgba(255, 255, 255, 0.5);
            }
        }

        @keyframes hp-flash-white {
            0% { opacity: 1; }
            50% { opacity: 0.7; } /* Efek kedip halus */
            100% { filter: brightness(3); } /* Kilatan putih tajam */
        }

        .super-healing-active .bar-bg:first-child {
            border: 2px solid #fff !important;
            box-shadow: 0 0 15px #00ff88;
            animation: hp-shake 0.1s infinite linear;
        }

    </style>
</head>
<body class="active-p1">

    <div id="event-banner">EVENT ACTIVE</div>
    <div id="global-timer">5.0</div>

    <div class="game-wrapper" id="arena">
        <div class="card" id="p1-card">
            <div id="p1-debuff" class="debuff-label"></div>
            <h2 style="color: var(--p1)">YOU</h2>
            <div class="bar-bg"><div id="p1-hp" class="hp-fill"></div><div class="bar-text" id="p1-hp-t">100/100</div></div>
            <div class="bar-bg"><div id="p1-mana" class="mana-fill"></div><div class="bar-text" id="p1-mana-t">30/100</div></div>
            <div class="grid" id="p1-skills"></div>
        </div>

        <div class="card" id="bot-card">
            <div id="bot-debuff" class="debuff-label"></div>
            <h2 style="color: var(--bot)">Jovita (Smart Bot V3)</h2>
            <div class="bar-bg"><div id="bot-hp" class="hp-fill"></div><div class="bar-text" id="bot-hp-t">100/100</div></div>
            <div class="bar-bg"><div id="bot-mana" class="mana-fill"></div><div class="bar-text" id="bot-mana-t">30/100</div></div>
            <div class="grid" id="bot-skills"></div>
        </div>
    </div>

    <div id="log">> Battle Start! Gunakan BURNING untuk damage berkala!<br>> Vampire Menyerang dan menyerap darah musuh</div>

    <script>

        const strikeSound = new Audio('/audio/StrikeSound.mp3');
        strikeSound.preload = 'auto';
        strikeSound.volume = 0.6;
        
        const ultiSound = new Audio('/audio/UltimateSound.mp3');
        ultiSound.preload = 'auto';
        ultiSound.volume = 1.0;

        const SKILLS = [
            { id: 'strike', name: 'STRIKE', cost: 5, cd: 5000, color: '#555' },
            { id: 'heal', name: 'HEAL', cost: 50, cd: 13000, color: '#27ae60' },
            { id: 'burning', name: 'BURNING', cost: 45, cd: 20000, color: '#e67e22' },
            { id: 'vampire', name: 'VAMPIRE', cost: 45, cd: 15000, color: '#8e44ad' },
            { id: 'shield', name: 'SHIELD', cost: 20, cd: 10000, color: '#2980b9' },
            { id: 'freeze', name: 'FREEZE', cost: 15, cd: 30000, color: '#74b9ff' },
            { id: 'ulti', name: 'ULTI', cost: 65, cd: 30000, color: '#c0392b' },
            { 
                id: 'super_punch', 
                name: 'SUPER PUNCH', 
                cost: 30,           // Biaya mana/stamina (bisa disesuaikan)
                cd: 15000,          // Cooldown 15 detik
                color: '#f1c40f',    // Warna kuning emas
                damage: 15, 
                healPerHit: 5, 
                hits: 3, 
                interval: 2000      // Jeda 2 detik (2000ms)
            },
            { 
                id: 'super_heal', 
                name: 'SUPER HEAL', 
                cost: 10, 
                cd: 90000,
                color: '#00ff88', 
                duration: 7, // Durasi heal 7 detik
                percent: 0.9  // 85% dari Max HP
            }
        ];

        let game = {
            turn: 'p1', timer: 5.0, active: true,
            event: { type: 'none', time: 0 },
            p1: { hp: 100, mana: 30, shield: 0, freeze: 0, burn: 0, sHeal: 0, cds: {} },
            bot: { hp: 200, mana: 40, shield: 0, freeze: 0, burn: 0, sHeal: 0, cds: {} }
        };

        // Init CDs
        ['p1', 'bot'].forEach(p => SKILLS.forEach(s => game[p].cds[s.id] = 0));

        function init() {
            [ 'p1', 'bot' ].forEach(p => {
                const cont = document.getElementById(`${p}-skills`);
                SKILLS.forEach(s => {
                    cont.innerHTML += `
                        <div class="skill-box">
                            <div id="${p}-${s.id}-txt" class="cd-text"></div>
                            <button id="${p}-${s.id}-btn" onclick="useSkill('${s.id}', '${p}')" style="border-bottom: 3px solid ${s.color}">${s.name}</button>
                            <div id="${p}-${s.id}-cd" class="cd-overlay"></div>
                        </div>`;
                });
            });
        }

        setInterval(() => {
            if (!game.active) return;
            
            // Logic Freeze
            if (game[game.turn].freeze > 0) {
                game[game.turn].freeze -= 0.1;
                if (game[game.turn].freeze <= 0) {
                    game[game.turn].freeze = 0;
                    document.getElementById(`${game.turn}-card`).classList.remove('frozen');
                    log(`${game.turn.toUpperCase()} sudah tidak membeku!`);
                    changeTurn();
                }
            } else {
                game.timer -= 0.1;
                if (game.timer <= 0) changeTurn();
            }

            // Logic Burning (Damage 5 per detik = 0.5 per 0.1s)
            ['p1', 'bot'].forEach(p => {
                if (game[p].burn > 0) {
                    game[p].burn -= 0.1;
                    game[p].hp -= 0.5; 
                    document.getElementById(`${p}-card`).classList.add('burning');
                    if (game[p].hp <= 0) win(p === 'p1' ? 'bot' : 'p1');
                    if (game[p].burn <= 0) {
                        game[p].burn = 0;
                        document.getElementById(`${p}-card`).classList.remove('burning');
                    }
                }
                updateDebuffLabel(p);
            });

            // Logic Super Heal (Regen Berkala)
            ['p1', 'bot'].forEach(p => {
                const maxHP = (p === 'bot') ? 200 : 100;

                if (game[p].sHeal > 0) {
                    game[p].sHeal -= 0.1;
                    
                    let healPerTick = (maxHP * 0.7) / 100;
                    game[p].hp = Math.min(maxHP, game[p].hp + healPerTick);

                    // Buat partikel hijau kecil berjatuhan (opsional tapi bagus untuk kontras)
                    for (let i = 0; i < 2; i++) { // Membuat 2 partikel sekaligus per tick
                        setTimeout(() => createHealParticle(p), i * 30);
                    }
                    
                    // --- AKTIFKAN VISUAL SUPER HEAL ---
                    // Ini akan memicu CSS di atas
                    document.getElementById(`${p}-card`).classList.add('super-healing-active');

                    if (game[p].sHeal <= 0) {
                        game[p].sHeal = 0;
                        // Hapus visual saat durasi habis
                        document.getElementById(`${p}-card`).classList.remove('super-healing-active');
                    }
                }
            });

            document.getElementById('global-timer').innerText = game.timer.toFixed(1);

            // Regen Logic
            let mR = 0.3, hR = 0;

            if (game.event.time > 0) {
                game.event.time -= 0.1;
                
                if (game.event.type === 'MANA') {
                    mR = 1.2;
                    // Tambahkan efek getar ke semua bar mana (P1 dan Bot)
                    document.querySelectorAll('.mana-fill').forEach(el => {
                        el.classList.add('mana-shaking-active');
                    });
                }
                
                if (game.event.type === 'HEALTH') hR = 0.25;

                // Jika waktu habis, hapus banner dan hapus efek getar
                if (game.event.time <= 0) {
                    document.getElementById('event-banner').className = '';
                    document.querySelectorAll('.mana-fill').forEach(el => {
                        el.classList.remove('mana-shaking-active');
                    });
                }
                
            } else if (Math.random() < 0.01) { // --> 003 Normal 
                startEvent();
            }

            ['p1', 'bot'].forEach(i => {
                // Tentukan batas maksimal HP: Bot 200, Player 100
                const maxHP = (i === 'bot') ? 200 : 100;

                // Tambah mana (tetap max 100)
                game[i].mana = Math.min(100, game[i].mana + mR);

                // Tambah HP dengan batas maxHP yang sesuai
                game[i].hp = Math.min(maxHP, game[i].hp + hR);
            });
            updateUI();
        }, 100);

        // function updateDebuffLabel(p) {
        //     let txt = "";
        //     if (game[p].freeze > 0) txt += `❄️ FROZEN (${game[p].freeze.toFixed(1)}s) `;
        //     if (game[p].burn > 0) txt += `🔥 BURNING (${game[p].burn.toFixed(1)}s)`;
        //     document.getElementById(`${p}-debuff`).innerText = txt;
        //     document.getElementById(`${p}-debuff`).style.color = game[p].freeze > 0 ? "var(--freeze)" : "var(--burn)";
        // }

        function updateDebuffLabel(p) {
            let txt = "";
            if (game[p].freeze > 0) txt += `❄️ FROZEN (${game[p].freeze.toFixed(1)}s) `;
            if (game[p].burn > 0) txt += `🔥 BURNING (${game[p].burn.toFixed(1)}s) `;
            if (game[p].sHeal > 0) txt += `✨ REGEN (${game[p].sHeal.toFixed(1)}s)`; // Tambahkan ini
            
            const el = document.getElementById(`${p}-debuff`);
            el.innerText = txt;
            
            // Atur warna label: Prioritas Freeze > Burn > Regen
            if (game[p].freeze > 0) el.style.color = "var(--freeze)";
            else if (game[p].burn > 0) el.style.color = "var(--burn)";
            else if (game[p].sHeal > 0) el.style.color = "#00ff88";
        }

        function startEvent() {
            // 1. Tentukan Tipe (Contoh 60% MANA, 40% HEALTH)
            game.event.type = Math.random() > 0.35 ? 'MANA' : 'HEALTH';
            
            // 2. Set Durasi
            game.event.time = 30;
            
            // 3. Update Banner
            const b = document.getElementById('event-banner');
            b.innerText = `${game.event.type} BOOST ACTIVE!`;
            b.className = 'event-active';

            // 4. Picu Efek Visual Segera
            if (game.event.type === 'MANA') {
                document.querySelectorAll('.mana-fill').forEach(el => {
                    el.classList.add('mana-shaking-active');
                });
            }

            log(`!!! EVENT: ${game.event.type} BOOST DIMULAI !!!`);
        }

        function useSkill(sid, pid) {
            if (pid !== game.turn || !game.active || game[pid].freeze > 0) return;
            const s = SKILLS.find(x => x.id === sid);
            const now = Date.now();
            const opp = pid === 'p1' ? 'bot' : 'p1';

            if (now < game[pid].cds[sid] || game[pid].mana < s.cost) return;

            game[pid].mana -= s.cost;
            game[pid].cds[sid] = now + s.cd;

            if (sid === 'strike') {
                let d = calc(10, 16, opp);
                game[opp].hp -= d;

                strikeSound.currentTime = 0; // Mulai dari awal
                strikeSound.play();

                setTimeout(() => {
                    strikeSound.pause();
                    strikeSound.currentTime = 0; 
                }, 2000);

                // LOGIKA BARU: Cek jika yang memukul adalah player ('p1')
                // Jika iya, beri mana 25 (lebih besar), jika bot beri 15.
                let manaGain = (pid === 'p1') ? 25 : 15; 
                game[pid].mana = Math.min(100, game[pid].mana + manaGain);
                
                createStrikeVisual(opp); 
                
                log(`${pid.toUpperCase()} Strike! ${opp.toUpperCase()} -${d} HP. (+${manaGain} Mana)`);
            } else if (sid === 'heal') {
                // 1. Tentukan batas HP maksimal dan jumlah heal berdasarkan siapa yang pakai
                const isBot = (pid === 'bot');
                const maxHP = isBot ? 200 : 100;
                const healAmount = isBot ? 40 : 30;

                // 2. Terapkan penambahan HP dengan batas yang sesuai
                game[pid].hp = Math.min(maxHP, game[pid].hp + healAmount);
                
                // --- EFEK VISUAL HEAL ---
                const card = document.getElementById(`${pid}-card`);
                card.classList.add('healing-active');
                
                // Munculkan partikel "+" Heal
                for(let i=0; i<5; i++) {
                    createHealParticle(pid);
                }

                setTimeout(() => card.classList.remove('healing-active'), 800);
                
                // Log pesan dengan jumlah heal yang dinamis
                log(`${pid.toUpperCase()} menggunakan Heal! (+${healAmount} HP)`);
            } else if (sid === 'burning') {
                game[opp].burn = 6.0;
                log(`🔥 ${pid.toUpperCase()} membakar ${opp.toUpperCase()} selama 6 detik!`);
            } else if (sid === 'shield') {
                // Memberikan 2 poin shield (akan berkurang tiap turn)
                game[pid].shield = 2; 
                
                // Efek Visual Instan saat diaktifkan
                const card = document.getElementById(`${pid}-card`);
                card.style.transition = "all 0.3s ease";
                card.style.transform = "scale(1.1)";
                
                // Partikel Shield
                for(let i=0; i<3; i++) {
                    const p = document.createElement('div');
                    p.className = 'heal-particle'; // Kita pinjam class heal tapi ganti warna di bawah
                    p.innerText = '🛡️';
                    p.style.left = (card.getBoundingClientRect().left + Math.random() * 100) + 'px';
                    p.style.top = (card.getBoundingClientRect().top) + 'px';
                    p.style.color = "#3498db";
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1000);
                }

                setTimeout(() => card.style.transform = "scale(1.02)", 300);
                
                log(`🛡️ ${pid.toUpperCase()} Mengaktifkan Pelindung (75% Damage Reduction)!`);
            } else if (sid === 'vampire') {
                let baseDamage = 20;
                // Ubah 0.5 menjadi 0.25 untuk pengurangan 75%
                let d = game[opp].shield > 0 ? Math.floor(baseDamage * 0.25) : baseDamage;
                
                game[opp].hp -= d;
                game[pid].hp = Math.min(100, game[pid].hp + 20);

                createVampireVisual(pid, opp); 
                log(`🦇 ${pid.toUpperCase()} Vampire! Sedot ${d} HP & Heal 20 HP.`);
            } else if (sid === 'freeze') {
                game[opp].freeze = 3.0;
                document.getElementById(`${opp}-card`).classList.add('frozen');
                log(`❄️ ${pid.toUpperCase()} membekukan ${opp.toUpperCase()}!`);
            } else if (sid === 'ulti') {
                let d = calc(35, 50, opp);
                
                ultiSound.currentTime = 0;
                ultiSound.play();

                setTimeout(() => {
                    ultiSound.pause();
                    ultiSound.currentTime = 0; 
                }, 2000);


                // --- DRAMATIC ULTI EFFECTS ---
                // 1. Flash Layar
                const flash = document.createElement('div');
                flash.className = 'ulti-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 700);
                const card = document.getElementById(`${pid}-card`);

                const rect = card.getBoundingClientRect();
                const wave = document.createElement('div');
                wave.className = 'shockwave';
                wave.style.left = (rect.left + rect.width/2) + 'px';
                wave.style.top = (rect.top + rect.height/2) + 'px';
                document.body.appendChild(wave);
                setTimeout(() => wave.remove(), 600);

                // 3. Damage Popup di kartu musuh
                const oppCard = document.getElementById(`${opp}-card`);
                const oppRect = oppCard.getBoundingClientRect();
                const popup = document.createElement('div');
                popup.className = 'dmg-popup';
                popup.innerText = `-${d}`;
                popup.style.left = (oppRect.left + oppRect.width/2 - 30) + 'px';
                popup.style.top = (oppRect.top + oppRect.height/2) + 'px';
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 800);

                // Eksekusi damage & shake
                game[opp].hp -= d;
                document.getElementById('arena').classList.add('shake');
                setTimeout(() => document.getElementById('arena').classList.remove('shake'), 500);
                
                log(`💥 ULTIMATE: ${pid.toUpperCase()} Menghancurkan ${opp.toUpperCase()} sebesar ${d} HP!`);
            } else if (sid === 'super_punch') {
                executeSuperPunch(pid, opp);
                log(`👊 ${pid.toUpperCase()} Menggunakan SUPER PUNCH! (3x Serangan Beruntun)`);
            } else if (sid === 'super_heal') {
                const s = SKILLS.find(x => x.id === 'super_heal');
                game[pid].sHeal = s.duration; // Set durasi 10 detik
                
                // Efek visual awal (ledakan partikel banyak)
                for(let i=0; i<15; i++) {
                    setTimeout(() => createHealParticle(pid), i * 50);
                }

                createSuperHealVisual(pid);

                log(`✨ ${pid.toUpperCase()} mengaktifkan SUPER HEAL! (Regen 70% HP selama 10 detik)`);
            }

            if (game[opp].hp <= 0) win(pid);
            else changeTurn();
        }

        function changeTurn() {
            game.turn = game.turn === 'p1' ? 'bot' : 'p1';
            game.timer = 5.0;
            document.body.className = `active-${game.turn}`;
            if (game[game.turn].shield > 0) game[game.turn].shield--;
            if (game[game.turn].freeze > 0) return; 
            if (game.turn === 'bot' && game.active) setTimeout(botAI, 1000);
        }
        
        function botAI() {
            if (game.turn !== 'bot' || !game.active || game.bot.freeze > 0) return;
            
            const b = game.bot;
            const p = game.p1;
            const now = Date.now();
            const getRemCD = (id) => Math.max(0, (b.cds[id] - now) / 1000);
            
            let targetSkill = null;
            let waitTime = 0;
            
            if (!targetSkill && b.hp < 100) {
                if (getRemCD('heal') < 1.5 && b.mana >= 40) {
                    targetSkill = 'heal';
                    waitTime = getRemCD('heal') * 1000;
                } 
                else if (getRemCD('super_punch') === 0 && b.mana >= 30) {
                    targetSkill = 'super_punch'; // Serang sambil isi darah sedikit
                    waitTime = 300;
                }
                else if (getRemCD('vampire') < 1.5 && b.mana >= 30) {
                    targetSkill = 'vampire';
                    waitTime = getRemCD('vampire') * 1000;
                }
            }
            
            else if (b.hp < 30 && getRemCD('super_heal') === 0 && b.mana >= 9) {
                targetSkill = 'super_heal';
                waitTime = 100; // Sangat cepat
                log("BOT: 'Gawat! Heal dulu!'");
            }

            // --- 2. EMERGENCY DEFENSE (Sekarang jadi Prioritas Kedua) ---
            else if (!targetSkill) {
                const pSuperPunchCD = (p.cds['super_punch'] - now) / 1000;
                
                // Reaksi terhadap Super Punch lawan
                if (pSuperPunchCD > 9.5 && b.shield <= 0 && getRemCD('shield') < 0.5) {
                    targetSkill = 'shield';
                    waitTime = 0;
                    log("BOT: 'Mengaktifkan Perisai!'");
                }
                // Reaksi terhadap kemungkinan Ulti lawan
                else if (p.mana >= 55 && b.hp < 55 && b.shield <= 0 && getRemCD('shield') < 2) {
                    targetSkill = 'shield';
                    const manaNeeded = 20 - b.mana;
                    waitTime = Math.max((manaNeeded / 3) * 1000, getRemCD('shield') * 1000);
                    log("BOT: 'Bahaya! Aku harus berlindung!'");
                }
            }

            // --- 3. KILLER INSTINCT (Finishing) ---
            else if (!targetSkill && p.hp < 100 && p.shield <= 0) {
                if (b.mana >= 65 && getRemCD('ulti') < 1) {
                    targetSkill = 'ulti';
                } else if (b.mana >= 30 && getRemCD('super_punch') === 0) {
                    targetSkill = 'super_punch'; // Super Punch cukup kuat untuk finishing
                }
            }

            // --- 4. ANTI-SHIELD & HARASSMENT ---
            else if (!targetSkill && p.shield > 0) {
                // 4a. Frezze dlu
                if (getRemCD('freeze') === 0 && b.mana >= 15) {
                    targetSkill = 'freeze';
                } 
                // 4b. Jika Freeze CD, cek Burning
                else if (b.mana >= 45) {
                    const burnCD = getRemCD('burning');
                    
                    if (burnCD === 0) {
                        targetSkill = 'burning';
                    } 
                    // Jika CD Burning dikit lagi (di bawah 4 detik), BOT pilih MENUNGGU
                    else if (burnCD < 4.5) {
                        targetSkill = 'burning';
                        waitTime = burnCD * 1000; // Tunggu sampai CD selesai
                    }
                    else {
                        targetSkill = 'strike';
                        waitTime = 1000;
                    }
                }
                // 4c. Default ke Strike jika mana tidak cukup untuk status
                else {
                    targetSkill = 'strike';
                    waitTime = 1000; 
                }
            }

            // --- 5. AGGRESSIVE COMBO (HP Aman) ---
            else if (!targetSkill && b.mana >= 45 && getRemCD('super_punch') === 0) {
                targetSkill = 'super_punch';
                waitTime = 500;
            }

            // --- 6. DEFAULT ACTION ---
            if (!targetSkill) {
                targetSkill = (b.mana >= 65 && getRemCD('ulti') < 1) ? 'ulti' : 'strike';
                waitTime = 0;
            }

            // --- EKSEKUSI ---
            const maxWaitAllowed = (game.timer - 0.5) * 1000;
            const finalWait = Math.max(0, Math.min(waitTime, maxWaitAllowed));

            setTimeout(() => {
                if (game.turn !== 'bot' || !game.active) return;
                
                const s = SKILLS.find(x => x.id === targetSkill);
                
                if (targetSkill && s && b.mana >= s.cost && Date.now() >= b.cds[targetSkill]) {
                    useSkill(targetSkill, 'bot');
                } 
                else if (b.mana >= 5 && Date.now() >= b.cds['strike']) {
                    // Logika menahan diri agar tidak asal pukul jika kondisi tidak menguntungkan
                    if (b.hp < 25 && p.mana >= 60 && targetSkill === 'strike') {
                        log("BOT: 'Sabar... satu langkah salah dan aku tamat.'");
                        changeTurn();
                    } else {
                        useSkill('strike', 'bot');
                    }
                } else {
                    changeTurn();
                }
            }, finalWait);
        }

        function updateUI() {
            const now = Date.now();
            ['p1', 'bot'].forEach(p => {
                // 1. Deklarasi HP Maksimal
                const maxHP = (p === 'bot') ? 200 : 100; 
                const hpPercent = (game[p].hp / maxHP) * 100;

                // 2. Update Visual Bar & Teks
                document.getElementById(`${p}-hp`).style.width = Math.max(0, hpPercent) + "%";
                document.getElementById(`${p}-mana`).style.width = game[p].mana + "%";
                document.getElementById(`${p}-hp-t`).innerText = Math.ceil(Math.max(0, game[p].hp)) + "/" + maxHP;
                document.getElementById(`${p}-mana-t`).innerText = Math.floor(game[p].mana) + "/100";

                // 3. Update Shield Visual
                const card = document.getElementById(`${p}-card`);
                if (game[p].shield > 0) {
                    card.classList.add('shield-active');
                } else {
                    card.classList.remove('shield-active');
                }
                
                // 4. Update Semua Tombol Skill
                SKILLS.forEach(s => {
                    const btn = document.getElementById(`${p}-${s.id}-btn`);
                    const over = document.getElementById(`${p}-${s.id}-cd`);
                    const txt = document.getElementById(`${p}-${s.id}-txt`);
                    const rem = game[p].cds[s.id] - now;
                    
                    if (rem > 0) {
                        // KONDISI: SEDANG COOLDOWN
                        over.style.height = (rem / s.cd * 100) + "%";
                        txt.innerText = (rem / 1000).toFixed(1);
                        btn.disabled = true;
                        if(s.id === 'super_heal') btn.classList.remove('ready-to-use');
                    } else {
                        // KONDISI: TIDAK COOLDOWN
                        over.style.height = "0%"; 
                        txt.innerText = "";

                        // --- LOGIKA KHUSUS LOCK SUPER HEAL 30% ---
                        if (s.id === 'super_heal') {
                            if (hpPercent < 30) { 
                                // Jika HP di bawah 30%, cek Mana, Turn, dan Status Freeze
                                btn.disabled = (game.turn !== p || game[p].mana < s.cost || game[p].freeze > 0);
                                
                                if (!btn.disabled) {
                                    btn.classList.add('ready-to-use');
                                } else {
                                    btn.classList.remove('ready-to-use');
                                }
                            } else {
                                // HP MASIH TINGGI (LOCK AKTIF)
                                btn.disabled = true;
                                btn.innerText = "SUPER HEAL < 30HP"; // Tampilkan syarat di tombol
                                btn.classList.remove('ready-to-use');
                                
                                // Opsional: Beri warna merah sedikit agar terlihat sebagai peringatan
                                btn.style.fontSize = "10px";
                            }
                        } else {
                            // SKILL LAIN TETAP NORMAL
                            btn.disabled = (game.turn !== p || game[p].mana < s.cost || game[p].freeze > 0);
                            btn.innerText = s.name;
                            btn.style.fontSize = ""; // Reset font size
                        }
                    }
                });
            });
        }

        function calc(min, max, t) {
            let b = Math.floor(Math.random()*(max-min+1))+min;
            // Mengurangi 75% damage (hanya 25% yang masuk)
            return game[t].shield > 0 ? Math.floor(b * 0.25) : b;
        }

        function log(m) {
            const l = document.getElementById('log');
            l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
        }

        function win(id) {
            game.active = false;
            setTimeout(() => {
                alert(id === 'p1' ? "SELAMAT! KAMU MENANG!" : "JOVITA JAHAT MENGALAHKANMU!");
                location.reload();
            }, 100);
        }

        function createHealParticle(pid) {
                    const card = document.getElementById(`${pid}-card`);
                    const rect = card.getBoundingClientRect();
                    const p = document.createElement('div');
                    
                    p.className = 'heal-particle';
                    p.innerText = '+';
                    
                    // Posisi acak di sekitar kartu
                    const x = rect.left + Math.random() * rect.width;
                    const y = rect.top + Math.random() * (rect.height / 2);
                    
                    p.style.left = x + 'px';
                    p.style.top = y + 'px';
                    
                    document.body.appendChild(p);
                    
                    // Hapus elemen dari DOM setelah animasi selesai
                    setTimeout(() => p.remove(), 1000);
                }

            function createStrikeVisual(targetPid) {
                const card = document.getElementById(`${targetPid}-card`);
                const arena = document.getElementById('arena');
                const rect = card.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                // 1. Flash Merah di seluruh layar
                const flash = document.createElement('div');
                flash.className = 'hit-flash';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 200);

                // 2. Guncangan Arena (Bukan cuma kartu)
                arena.classList.add('heavy-shake');
                setTimeout(() => arena.classList.remove('heavy-shake'), 400);

                // 3. Tambahkan Efek Sabetan (Strike Effect yang tadi)
                const strike = document.createElement('div');
                strike.className = 'strike-effect'; // Pastikan class dari jawaban sebelumnya masih ada
                strike.style.left = (centerX - 100) + 'px';
                strike.style.top = (centerY - 20) + 'px';
                strike.style.setProperty('--rot', `${Math.random() * 360}deg`);
                document.body.appendChild(strike);
                setTimeout(() => strike.remove(), 300);

                // 4. Ledakan Partikel "Darah/Percikan"
                for (let i = 0; i < 12; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'strike-spark';
                    
                    // Arah ledakan acak
                    const tx = (Math.random() - 0.5) * 200;
                    const ty = (Math.random() - 0.5) * 200;
                    
                    spark.style.left = centerX + 'px';
                    spark.style.top = centerY + 'px';
                    spark.style.setProperty('--tx', `${tx}px`);
                    spark.style.setProperty('--ty', `${ty}px`);
                    
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 500);
                }
        }

        // VAMPIRE EFFECT  (HEAVY)

        function createVampireVisual(sourcePid, targetPid) {
            const sourceCard = document.getElementById(`${sourcePid}-card`);
            const targetCard = document.getElementById(`${targetPid}-card`);
            
            const sRect = sourceCard.getBoundingClientRect();
            const tRect = targetCard.getBoundingClientRect();

            // 1. Efek Layar Menggelap
            const dim = document.createElement('div');
            dim.className = 'vamp-dim';
            document.body.appendChild(dim);
            setTimeout(() => dim.remove(), 1000);

            // 2. Aura pada Pengguna
            sourceCard.classList.add('vampire-active');
            setTimeout(() => sourceCard.classList.remove('vampire-active'), 1000);

            // 3. Kirim "Orbs" dari Musuh ke Pengguna
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const orb = document.createElement('div');
                    orb.className = 'vamp-orb';
                    
                    // Titik awal (tengah kartu musuh dengan sedikit acak)
                    const startX = tRect.left + tRect.width / 2 + (Math.random() - 0.5) * 50;
                    const startY = tRect.top + tRect.height / 2 + (Math.random() - 0.5) * 50;
                    
                    // Hitung jarak ke kartu tujuan
                    const dx = (sRect.left + sRect.width / 2) - startX;
                    const dy = (sRect.top + sRect.height / 2) - startY;

                    orb.style.left = startX + 'px';
                    orb.style.top = startY + 'px';
                    orb.style.setProperty('--dx', `${dx}px`);
                    orb.style.setProperty('--dy', `${dy}px`);

                    document.body.appendChild(orb);
                    setTimeout(() => orb.remove(), 800);
                }, i * 100); // Orbs muncul bergantian
            }
        }

        function executeSuperPunch(pid, opp) {
            let hitsDone = 0;
            const s = SKILLS.find(x => x.id === 'super_punch');

            function performPunch() {
                if (!game.active) return;

                // 1. Hitung Damage (Cek Shield)
                let d = calc(s.damage, s.damage, opp); 
                game[opp].hp -= d;

                // 2. Heal Pengguna (Bot & Player tetap dapat Heal)
                const maxHP = (pid === 'bot') ? 200 : 100;

                let healAmount = (pid === 'p1') ? 7 : s.healPerHit;
                
                game[pid].hp = Math.min(maxHP, game[pid].hp + healAmount);

                // 3. LOGIKA MANA KHUSUS PLAYER 1
                let manaText = "";
                if (pid === 'p1') {
                    game[pid].mana = Math.min(100, game[pid].mana + 8);
                    manaText = " (+7 Mana)";
                }

                // --- VISUAL & LOG ---
                createSuperPunchVisual(opp); 
                createHealParticle(pid);
                
                // Log akan otomatis menyesuaikan apakah ada teks "+7 Mana" atau tidak
                log(`👊 PUNCH ${hitsDone + 1}: ${opp.toUpperCase()} -${d} HP!${manaText}`);

                if (game[opp].hp <= 0) {
                    win(pid);
                    return true; 
                }
                updateUI();
                return false;
            }

            // Pukulan pertama
            performPunch();
            hitsDone++;

            // Interval untuk pukulan 2 dan 3
            const punchTimer = setInterval(() => {
                if (hitsDone >= 3 || !game.active) {
                    clearInterval(punchTimer);
                    return;
                }
                
                const isDead = performPunch();
                if (isDead) clearInterval(punchTimer);
                
                hitsDone++;
            }, s.interval);
        }

        function createSuperPunchVisual(targetPid) {
            const card = document.getElementById(`${targetPid}-card`);
            const arena = document.getElementById('arena');
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // --- 1. TEKS "SUPER PUNCH!" ---
            const txt = document.createElement('div');
            txt.className = 'punch-text';
            txt.innerText = 'SUPER PUNCH!';
            // Posisi teks sedikit acak agar jika muncul beruntun tidak menumpuk sempurna
            txt.style.left = (centerX - 80 + (Math.random() * 40)) + 'px';
            txt.style.top = (centerY - 50) + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 800);

            // 2. Flash Kuning
            const flash = document.createElement('div');
            flash.className = 'hit-flash';
            flash.style.background = 'rgba(241, 196, 15, 0.4)'; 
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 150);

            // 3. Getaran Gila
            arena.classList.add('heavy-shake');
            setTimeout(() => arena.classList.remove('heavy-shake'), 500);

            // 4. Efek Ledakan Pukulan (Lingkaran)
            const impact = document.createElement('div');
            impact.style.position = 'fixed';
            impact.style.left = (centerX - 50) + 'px';
            impact.style.top = (centerY - 50) + 'px';
            impact.style.width = '100px';
            impact.style.height = '100px';
            impact.style.border = '5px solid #f1c40f';
            impact.style.borderRadius = '50%';
            impact.style.animation = 'pulse-out 0.3s ease-out forwards';
            impact.style.pointerEvents = 'none';
            impact.style.zIndex = '9999';
            document.body.appendChild(impact);
            setTimeout(() => impact.remove(), 300);

            // 5. Partikel Emas
            for (let i = 0; i < 20; i++) {
                const spark = document.createElement('div');
                spark.className = 'strike-spark';
                spark.style.background = '#f1c40f';
                spark.style.boxShadow = '0 0 10px #f1c40f';
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400;
                spark.style.left = centerX + 'px';
                spark.style.top = centerY + 'px';
                spark.style.setProperty('--tx', `${tx}px`);
                spark.style.setProperty('--ty', `${ty}px`);
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 600);
            }
        }

        function createSuperHealVisual(pid) {
            const card = document.getElementById(`${pid}-card`);
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // 1. Flash Layar Hijau Lembut (Soft Flash)
            const flash = document.createElement('div');
            flash.className = 'hit-flash'; // Gunakan class flash yang sudah ada
            flash.style.background = 'rgba(0, 255, 136, 0.3)'; 
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 250);

            // 2. Ledakan Partikel Super
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'super-heal-particle';
                    
                    // Simbol acak: Plus, Hati, atau Kilauan
                    const symbols = ['+', '💖', '✨', '🌿'];
                    p.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    // Tentukan arah ledakan acak
                    const angle = Math.random() * Math.PI * 2; // 0 hingga 360 derajat
                    const dist = 100 + Math.random() * 150; // Jarak sebaran
                    const dx = Math.cos(angle) * dist + 'px';
                    const dy = Math.sin(angle) * dist + 'px';
                    const rot = (Math.random() - 0.5) * 360 + 'deg';

                    p.style.left = centerX + 'px';
                    p.style.top = centerY + 'px';
                    p.style.setProperty('--dx', dx);
                    p.style.setProperty('--dy', dy);
                    p.style.setProperty('--rot', rot);

                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 1200);
                }, i * 30); // Muncul berurutan cepat
            }
        }
        
        init();


    </script>
</body>
